<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#212529"/>

  <!-- Red accent bars -->
  <rect width="1200" height="12" fill="#E63946"/>
  <rect y="618" width="1200" height="12" fill="#E63946"/>

  <!-- License plate shape -->
  <rect x="200" y="118" width="800" height="342" rx="24" fill="#F5F0E8"/>
  <rect x="216" y="134" width="768" height="310" rx="16" fill="none" stroke="#ADB5BD" stroke-width="3"/>

  <!-- Plate bolt holes -->
  <circle cx="252" cy="166" r="10" fill="#ADB5BD"/>
  <circle cx="948" cy="166" r="10" fill="#ADB5BD"/>
  <circle cx="252" cy="426" r="10" fill="#ADB5BD"/>
  <circle cx="948" cy="426" r="10" fill="#ADB5BD"/>

  <!-- Plate top label -->
  <text x="600" y="178" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ADB5BD" text-anchor="middle" letter-spacing="8">ROAD TRIP GAME</text>

  <!-- Magnifying glass -->
  <circle cx="600" cy="218" r="22" fill="none" stroke="#212529" stroke-width="5"/>
  <line x1="616" y1="234" x2="636" y2="254" stroke="#212529" stroke-width="5" stroke-linecap="round"/>

  <!-- Main plate text: two lines -->
  <text x="600" y="330" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#212529" text-anchor="middle">License Plate</text>
  <text x="600" y="418" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" fill="#212529" text-anchor="middle">Hunt</text>

  <!-- Found state pills -->
  <rect x="222" y="490" width="72" height="44" rx="10" fill="#2D6A4F"/>
  <text x="258" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">CA</text>

  <rect x="306" y="490" width="72" height="44" rx="10" fill="#2D6A4F"/>
  <text x="342" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">TX</text>

  <rect x="390" y="490" width="72" height="44" rx="10" fill="#2D6A4F"/>
  <text x="426" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">NY</text>

  <rect x="474" y="490" width="72" height="44" rx="10" fill="#2D6A4F"/>
  <text x="510" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">FL</text>

  <rect x="558" y="490" width="72" height="44" rx="10" fill="#2D6A4F"/>
  <text x="594" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">IL</text>

  <!-- Unfound state pills -->
  <rect x="642" y="490" width="72" height="44" rx="10" fill="#343A40"/>
  <text x="678" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6C757D" text-anchor="middle">WA</text>

  <rect x="726" y="490" width="72" height="44" rx="10" fill="#343A40"/>
  <text x="762" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6C757D" text-anchor="middle">OR</text>

  <rect x="810" y="490" width="72" height="44" rx="10" fill="#343A40"/>
  <text x="846" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6C757D" text-anchor="middle">MT</text>

  <rect x="894" y="490" width="72" height="44" rx="10" fill="#343A40"/>
  <text x="930" y="518" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6C757D" text-anchor="middle">AK</text>

  <!-- Tagline -->
  <text x="600" y="592" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#6C757D" text-anchor="middle">Spot license plates from all 50 states on your road trip</text>
</svg>
